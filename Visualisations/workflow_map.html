    <meta charset="UTF-8">

    <title>Project Workflow Map</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #F8FAFC 0%, #EFF6FF 50%, #F0F4FF 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .toggle-container {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        
        .toggle-btn {
            padding: 10px 20px;
            border: none;
            background: white;
            cursor: pointer;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: #64748B;
            transition: all 0.2s;
        }
        
        .toggle-btn:hover {
            background: #F1F5F9;
        }
        
        .toggle-btn.active {
            background: #3B82F6;
            color: white;
        }
        
        .svg-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: grab;
            padding-top: 60px;
        }
        
        .svg-container:active { cursor: grabbing; }
        
        .svg-wrapper {
            transform-origin: 0 0;
            transition: transform 0.1s ease-out;
        }
        
        .view-desc, .view-file { display: none; }
        .view-desc.active, .view-file.active { display: block; }
        
        .help-text {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 11px;
            color: #64748B;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
    </style>
</head>

    <div class="help-text">Scroll to zoom | Drag to pan | Double-click to zoom in | Press 0 to reset | Press 1/2 to toggle views</div>

    <script>
        const container = document.getElementById('container');
        const wrapper = document.getElementById('wrapper');
        const toggleBtns = document.querySelectorAll('.toggle-btn');
        
        let scale = 1;
        let translateX = 50;
        let translateY = 20;
        let isDragging = false;
        let startX, startY;
        
        const MIN_SCALE = 0.3;
        const MAX_SCALE = 4;
        const ZOOM_STEP = 0.15;
        
        // Toggle view
        toggleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                toggleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const view = btn.dataset.view;
                document.querySelectorAll('.view-desc, .view-file').forEach(el => el.classList.remove('active'));
                document.querySelector('.view-' + view).classList.add('active');
            });
        });
        
        function updateTransform(smooth = true) {
            wrapper.style.transition = smooth ? 'transform 0.3s ease-out' : 'transform 0.05s ease-out';
            wrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }
        
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
            const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale + delta));
            
            const rect = container.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const scaleChange = newScale / scale;
            translateX = mouseX - (mouseX - translateX) * scaleChange;
            translateY = mouseY - (mouseY - translateY) * scaleChange;
            
            scale = newScale;
            updateTransform(false);
        }, { passive: false });
        
        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
            container.style.cursor = 'grabbing';
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform(false);
        });
        
        document.addEventListener('mouseup', () => {
            isDragging = false;
            container.style.cursor = 'grab';
        });
        
        container.addEventListener('dblclick', (e) => {
            const rect = container.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const newScale = Math.min(MAX_SCALE, scale + 0.5);
            const scaleChange = newScale / scale;
            translateX = mouseX - (mouseX - translateX) * scaleChange;
            translateY = mouseY - (mouseY - translateY) * scaleChange;
            
            scale = newScale;
            updateTransform();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === '+' || e.key === '=') {
                scale = Math.min(MAX_SCALE, scale + ZOOM_STEP);
                updateTransform();
            }
            if (e.key === '-') {
                scale = Math.max(MIN_SCALE, scale - ZOOM_STEP);
                updateTransform();
            }
            if (e.key === '0' || e.key === 'Escape') {
                scale = 1;
                translateX = 50;
                translateY = 20;
                updateTransform();
            }
            // Toggle views with 1 and 2 keys
            if (e.key === '1') {
                toggleBtns[0].click();
            }
            if (e.key === '2') {
                toggleBtns[1].click();
            }
        });
        
        updateTransform();
    </script>
